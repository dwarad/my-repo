<template>
    <!-- Work Experience Section -->
    <section class="resume-section">
        <h2 class="section-heading">Work Experience</h2>
        <div class="section-rule"></div>
        <template for:each={experiences} for:item="exp">
            <div key={exp.id} class="exp-item">
                <div class="exp-header">
                    <div class="exp-left">
                        <p class="exp-company">{exp.company}</p>
                        <p class="exp-role">{exp.role}</p>
                    </div>
                    <div class="exp-right">
                        <p class="exp-period">{exp.period}</p>
                    </div>
                </div>
                <ul class="exp-bullets">
                    <template for:each={exp.bullets} for:item="bullet">
                        <li key={bullet}>{bullet}</li>
                    </template>
                </ul>
            </div>
        </template>
    </section>

    <!-- Key Projects Section -->
    <section class="resume-section">
        <h2 class="section-heading">Key Projects</h2>
        <div class="section-rule"></div>
        <div class="projects-grid">
            <template for:each={projects} for:item="proj">
                <div key={proj.id} class="proj-card">
                    <h3 class="proj-title">{proj.title}</h3>
                    <p class="proj-desc">{proj.description}</p>
                    <div class="proj-tech">
                        <template for:each={proj.techStack} for:item="tech">
                            <span key={tech} class="tech-tag">{tech}</span>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </section>
</template>
